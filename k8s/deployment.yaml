apiVersion: v1
kind: Namespace
metadata:
  name: weather-monitoring
---
# Zookeeper Service & Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: bitnami/zookeeper:latest
          environment:
            - name: ALLOW_ANONYMOUS_LOGIN
              value: "yes"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: weather-monitoring
spec:
  ports:
    - port: 2181
      targetPort: 2181
  selector:
    app: zookeeper
---
# Kafka Service & Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: bitnami/kafka:latest
          environment:
            - name: KAFKA_CFG_ZOOKEEPER_CONNECT
              value: zookeeper:2181
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
            - name: KAFKA_CFG_LISTENERS
              value: PLAINTEXT://:9092
            - name: KAFKA_CFG_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: weather-monitoring
spec:
  ports:
    - port: 9092
      targetPort: 9092
  selector:
    app: kafka
---
# ElasticSearch & Kibana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
          environment:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: weather-monitoring
spec:
  ports:
    - port: 9200
  selector:
    app: elasticsearch
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.10.2
          environment:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: weather-monitoring
spec:
  type: NodePort
  ports:
    - port: 5601
  selector:
    app: kibana
---
# Central Station
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-station
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-station
  template:
    metadata:
      labels:
        app: central-station
    spec:
      containers:
        - name: central-station
          image: central-station:latest # Requires image to be built or pushed
          imagePullPolicy: Never
          volumeMounts:
            - name: storage
              mountPath: /data
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: central-station
  namespace: weather-monitoring
spec:
  ports:
    - port: 8080
  selector:
    app: central-station
---
# Persistent Volume Claim for Shared Storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-pvc
  namespace: weather-monitoring
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
---
# Weather Stations (10 Replicas)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-station
  namespace: weather-monitoring
spec:
  replicas: 10
  selector:
    matchLabels:
      app: weather-station
  template:
    metadata:
      labels:
        app: weather-station
    spec:
      containers:
        - name: weather-station
          image: weather-station:latest # Requires image to be built or pushed
          imagePullPolicy: Never
          # We can use POD_NAME to inject a unique ID per station
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
