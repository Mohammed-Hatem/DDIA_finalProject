apiVersion: v1
kind: Namespace
metadata:
  name: weather-monitoring
---
# ───────────── Shared Storage ─────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: shared-pvc
  namespace: weather-monitoring
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 2Gi
---
# ───────────── Zookeeper ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
        - name: zookeeper
          image: confluentinc/cp-zookeeper:7.5.0
          ports:
            - containerPort: 2181
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: weather-monitoring
spec:
  ports:
    - port: 2181
      targetPort: 2181
  selector:
    app: zookeeper
---
# ───────────── Kafka ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.5.0
          ports:
            - containerPort: 9092
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: weather-monitoring
spec:
  ports:
    - port: 9092
      targetPort: 9092
  selector:
    app: kafka
---
# ───────────── ElasticSearch ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
          ports:
            - containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: weather-monitoring
spec:
  ports:
    - port: 9200
      targetPort: 9200
  selector:
    app: elasticsearch
---
# ───────────── Kibana ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.10.2
          ports:
            - containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: weather-monitoring
spec:
  type: NodePort
  ports:
    - port: 5601
      targetPort: 5601
  selector:
    app: kibana
---
# ───────────── Central Station ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: central-station
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: central-station
  template:
    metadata:
      labels:
        app: central-station
    spec:
      containers:
        - name: central-station
          image: central-station:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: BITCASK_DIR
              value: /data/bitcask
            - name: PARQUET_DIR
              value: /data/parquet
          volumeMounts:
            - name: shared-storage
              mountPath: /data
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: central-station
  namespace: weather-monitoring
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: central-station
---
# ───────────── Rain Detector Processor ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rain-detector
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rain-detector
  template:
    metadata:
      labels:
        app: rain-detector
    spec:
      containers:
        - name: rain-detector
          image: kafka-processor:latest
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
---
# ───────────── Parquet Shipper ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: parquet-shipper
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: parquet-shipper
  template:
    metadata:
      labels:
        app: parquet-shipper
    spec:
      containers:
        - name: parquet-shipper
          image: parquet-shipper:latest
          imagePullPolicy: Never
          env:
            - name: ES_HOST
              value: "http://elasticsearch:9200"
            - name: PARQUET_DIR
              value: /data/parquet
            - name: STATE_FILE
              value: /data/parquet_shipper_state.txt
          volumeMounts:
            - name: shared-storage
              mountPath: /data
      volumes:
        - name: shared-storage
          persistentVolumeClaim:
            claimName: shared-pvc
---
# ───────────── Open-Meteo Integration ─────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-meteo-integration
  namespace: weather-monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-meteo-integration
  template:
    metadata:
      labels:
        app: open-meteo-integration
    spec:
      containers:
        - name: open-meteo-integration
          image: open-meteo-integration:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
---
