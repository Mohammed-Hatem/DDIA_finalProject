# Kafka
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
kafka.topic=weather_status

# Open-Meteo API — Alexandria, Egypt coordinates
openmeteo.url=https://api.open-meteo.com/v1/forecast?latitude=31.20&longitude=29.91&current_weather=true

# Disable Spring Boot web server (headless integration service)
spring.main.web-application-type=none
